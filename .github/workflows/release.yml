name: Test, build and publish module

on:
  push:
    branches: [main]
    paths:
      - module.prop
      - bin/**
      - system/**
      - config/**
      - tests/**
      - customize.sh
      - service.sh
      - boot-completed.sh
      - action.sh
      - uninstall.sh
      - README.md
      - CHANGELOG.md
      - update.json
      - .github/workflows/release.yml
  pull_request:
    paths:
      - module.prop
      - bin/**
      - system/**
      - config/**
      - tests/**
      - customize.sh
      - service.sh
      - boot-completed.sh
      - action.sh
      - uninstall.sh
      - README.md
      - CHANGELOG.md
      - update.json
      - .github/workflows/release.yml

permissions:
  contents: write

concurrency:
  group: module-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Regression tests
        run: tests/run-tests.sh

  release:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(sed -n 's/^version=//p' module.prop | head -n1)"
          code="$(sed -n 's/^versionCode=//p' module.prop | head -n1)"
          test -n "$version" && test -n "$code"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "code=$code" >> "$GITHUB_OUTPUT"
      - name: Validate metadata
        run: |
          python3 -m json.tool update.json >/dev/null
          test "$(python3 -c 'import json;print(json.load(open("update.json"))["version"])')" = "${{ steps.version.outputs.version }}"
          test "$(python3 -c 'import json;print(json.load(open("update.json"))["versionCode"])')" = "${{ steps.version.outputs.code }}"
      - name: Build flashable ZIP
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          zip_name="ModuleConflictDetector-${version}.zip"
          zip -r -9 "$zip_name" \
            module.prop customize.sh service.sh boot-completed.sh action.sh uninstall.sh \
            README.md CHANGELOG.md update.json bin system config
          sha256sum "$zip_name" > "$zip_name.sha256"
          unzip -t "$zip_name"
          echo "zip_name=$zip_name" >> "$GITHUB_OUTPUT"
      - name: Prepare notes
        run: |
          version="${{ steps.version.outputs.version }}"
          awk -v h="## ${version}" 'index($0,h)==1{f=1;next} f&&/^## /{exit} f{print}' CHANGELOG.md > release-notes.md
          test -s release-notes.md
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          zip_name="${{ steps.package.outputs.zip_name }}"
          if gh release view "$version" >/dev/null 2>&1; then
            gh release upload "$version" "$zip_name" "$zip_name.sha256" --clobber
            gh release edit "$version" --title "$version" --notes-file release-notes.md --latest
          else
            gh release create "$version" "$zip_name" "$zip_name.sha256" --target "$GITHUB_SHA" --title "$version" --notes-file release-notes.md --latest
          fi
